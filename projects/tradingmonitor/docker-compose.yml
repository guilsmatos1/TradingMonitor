x-casaos:
  architectures:
    - amd64
    - arm64
  main: tradingmonitor_app
  author: guilsmatos
  category: Finance
  description:
    en_us: Real-time trading monitor dashboard with MT5 ingestion
  tagline:
    en_us: Trading Monitor
  title:
    en_us: TradingMonitor
  scheme: http
  index: /
  port_map: "8000"
  env:
    - DATABASE_URL
    - API_KEY
    - DATAMANAGER_URL
    - DATAMANAGER_API_KEY

services:
  tradingmonitor_app:
    build:
      context: ../..
      dockerfile: projects/tradingmonitor/Dockerfile
    image: guilsmatos/tradingmonitor:latest
    container_name: tradingmonitor-server
    restart: always
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
      - "${SERVER_PORT:-5555}:5555"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://tradingmonitor_user:changeme@host.docker.internal:5432/tradingmonitor}
      - API_KEY=${API_KEY:-changeme}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8000}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=${SERVER_PORT:-5555}
      - DATAMANAGER_URL=${DATAMANAGER_URL:-http://host.docker.internal:8686}
      - DATAMANAGER_API_KEY=${DATAMANAGER_API_KEY:-}
      - ENABLE_NOTIFICATIONS=${ENABLE_NOTIFICATIONS:-false}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ENABLE_DRIFT_ALERTS=${ENABLE_DRIFT_ALERTS:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - tradingmonitor_reports:/app/reports
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  tradingmonitor_reports:
