services:
  tradingmonitor:
    image: guilsmatos/tradingmonitor:latest
    container_name: tradingmonitor
    restart: unless-stopped
    networks:
      - datamanager_default
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
      - "${SERVER_PORT:-5555}:5555"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-datamanager}:${POSTGRES_PASSWORD:-changeme}@datamanager-timescaledb:5432/tradingmonitor
      API_KEY: ${API_KEY:-changeme}
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8000"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5555"
      DATAMANAGER_URL: ${DATAMANAGER_URL:-http://datamanager-server:8686}
      DATAMANAGER_API_KEY: ${DATAMANAGER_API_KEY:-}
      ENABLE_NOTIFICATIONS: ${ENABLE_NOTIFICATIONS:-false}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ENABLE_DRIFT_ALERTS: ${ENABLE_DRIFT_ALERTS:-true}
    volumes:
      - tradingmonitor_reports:/app/reports

networks:
  datamanager_default:
    external: true

volumes:
  tradingmonitor_reports:
