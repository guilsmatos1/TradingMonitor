services:
  tradingmonitor:
    image: guilsmatos/tradingmonitor:latest
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
      - "${SERVER_PORT:-5555}:5555"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@timescaledb:5432/tradingmonitor
      API_KEY: ${API_KEY:-changeme}
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8000"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "5555"
      DATAMANAGER_URL: ${DATAMANAGER_URL:-http://localhost:8686}
      DATAMANAGER_API_KEY: ${DATAMANAGER_API_KEY:-}
      ENABLE_NOTIFICATIONS: ${ENABLE_NOTIFICATIONS:-false}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ENABLE_DRIFT_ALERTS: ${ENABLE_DRIFT_ALERTS:-true}
    volumes:
      - tradingmonitor_reports:/app/reports

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: tradingmonitor
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradingmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  timescaledb_data:
  tradingmonitor_reports:
