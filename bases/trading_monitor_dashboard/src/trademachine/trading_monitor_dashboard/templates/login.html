<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingMonitor — Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M3 3v18h18'/%3E%3Cpath d='m19 9-5 5-4-4-3 3'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function() {
            const t = localStorage.getItem("tm-theme") || "dark";
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
</head>
<body>
    <main class="container" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <section class="card" style="max-width:420px;width:100%;">
            <div class="section-header">
                <h1 style="margin:0;font-size:1.25rem;">TradingMonitor</h1>
            </div>
            <p class="text-muted" style="margin:0 0 1rem;">Enter the dashboard API key to start a session.</p>
            {% if error %}
            <p class="error" style="margin:0 0 1rem;">{{ error }}</p>
            {% endif %}
            <form method="post" action="/login" style="display:flex;flex-direction:column;gap:0.9rem;">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="field-group">
                    <span class="field-label">API Key</span>
                    <input class="field-input" type="password" name="api_key" autocomplete="current-password" required autofocus>
                </div>
                <button class="btn btn-primary btn-sm" type="submit">Sign in</button>
            </form>
        </section>
    </main>
</body>
</html>
